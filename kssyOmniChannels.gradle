// apply app-level build.gradle

// 1. 本配置文件通过运行"gradlew omniPreChannels"自动生成；
// 2. 运行指令前请按接入文档编译章节，在shiyou目录下配置好渠道信息、资源；
// 3. 每次增加新渠道、或渠道增加资源（shiyou/*/main/目录）、或渠道新增依赖时，都要运行指令，以生成最新配置；其他情况无需运行。
// 4. 修改版本号无需运行指令；
// 5. 请将本文件变更提交代码库，以支持项目服务器编译。
// 6. 如果不懂Android-Variants-Build，请不要修改配置结构；项目只需要"运行脚本->升级版本号->提交代码库"即可。

// 多渠道配置：使用控制面板（默认在左侧下位置: "Build Variants"）切换"Run"编译的渠道，即工程默认渠道。
android {
	flavorDimensions "default"
	// 多渠道列表
	productFlavors {
		huawei {
			dimension "default"
			applicationId "com.jssygp.bulletangelceshi.huawei"
		}
		vk {
			dimension "default"
			applicationId "com.durakking.bestonlinecard"
			// vk 渠道特殊配置
			resValue("integer", "com_vk_sdk_AppId", "7877340")
		}
		website_en {
			dimension "default"
			applicationId "com.jssygp.bulletangel"
			manifestPlaceholders = [
					applovinKey: "_r63Ozwv0Q3pB36qHicpG1yCsTbEpH_fsc-Wq5oI1wZsrs_rx-mnZT5RJTmelL7_OHieFwTbpXS3rWeSaqhUVr",
					facebookAppId: "230387711488913",
					facebookAppName: "Bullet Angel",
					googleAdmobAppid: "ca-app-pub-4638173289828736~5175605488",
			]
		}
		vivo_en {
			dimension "default"
			applicationId "com.jssygp.bulletangel.vivo"
			manifestPlaceholders = [
					appId: "2020091514000924586",
					facebookAppId: "230387711488913",
					facebookAppName: "Bullet Angel",
			]
		}
	}

	sourceSets {
		main {
			// 默认、所有资源渠道共享，不要修改。
		}
		// 多渠道资源配置，如果有
		huawei {
			assets.srcDirs = ["${project.rootDir}/shiyou/${name}/main/assets"]
		}
		vk {
			assets.srcDirs = ["${project.rootDir}/shiyou/${name}/main/assets"]
		}
		website_en {
			assets.srcDirs = ["${project.rootDir}/shiyou/${name}/main/assets"]
		}
		vivo_en {
			assets.srcDirs = ["${project.rootDir}/shiyou/${name}/main/assets"]
		}
	}
}

if (getGradle().getStartParameter().getTaskRequests().toString().contains("Huawei")) {
	apply plugin: "com.huawei.agconnect"
}

// 渠道依赖配置
dependencies {

	// 封版|发版 前请 Omni 确认是否需要升级到最新版本。
	// OmniSDK API 依赖（所有渠道包的公共依赖）
	String apiVersion = "1.0.8" // Please replace with the latest version if needed.
	api("com.kingsoft.shiyou.omnisdk.component:api:$apiVersion")

	// OmniSDK Plugin 依赖（所有渠道包的公共依赖）
	implementation("com.kingsoft.shiyou.omnisdk.plugin:omni-account:1.0.8")

	// 渠道的各自依赖，根据 shiyou/*/kssyOmni.gradle 下各渠道配置脚本生成
	// huawei
	huaweiImplementation("com.kingsoft.shiyou.omnisdk.plugin:google:1.0.6")
	huaweiImplementation("com.kingsoft.shiyou.omnisdk.plugin:facebook:1.0.6")
	huaweiImplementation("com.kingsoft.shiyou.omnisdk.channel:huawei:1.0.6")

// vk
	vkImplementation("com.kingsoft.shiyou.omnisdk.channel:vk:3.1.0")

// website_en
	website_enImplementation("com.kingsoft.shiyou.omnisdk.plugin:google-pay:3.0.0")
	website_enImplementation("com.kingsoft.shiyou.omnisdk.plugin:facebook:9.1.1")
	website_enImplementation("com.kingsoft.shiyou.omnisdk.plugin:google:19.0.0")
	website_enImplementation("com.kingsoft.shiyou.omnisdk.plugin:line:5.6.0")
	website_enImplementation("com.kingsoft.shiyou.omnisdk.channel:website-en:1.0.8")

// vivo_en
	vivo_enImplementation("com.kingsoft.shiyou.omnisdk.plugin:google:19.0.0")
	vivo_enImplementation("com.kingsoft.shiyou.omnisdk.plugin:facebook:9.1.1")
	vivo_enImplementation("com.kingsoft.shiyou.omnisdk.channel:vivo-en:1.6.0.0")

}
